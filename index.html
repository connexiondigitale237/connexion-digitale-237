<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Digitale 237</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <img src="logo.png.jpg" alt="Logo" class="nav-logo">
        <nav>
            <a href="#services">Services</a>
            <a href="#formations">Formations</a>
        </nav>
    </header>

    <main class="container">
        <!-- Section Services -->
        <section id="services">
            <h1>Nos Services Digitaux, Design & Vidéo</h1>
            <div class="grid">
                <div class="card"><h3>Pack Starter</h3><p>15 000 FCFA</p></div>
                <div class="card"><h3>Pack Business</h3><p>55 000 FCFA</p></div>
                <div class="card"><h3>Pack Social</h3><p>45 000 FCFA</p></div>
            </div>
        </section>

        <!-- Section Formations -->
        <section id="formations">
            <h2>Inscription aux Formations</h2>
            <select id="trainingSelect">
                <option value="Pack complet">Pack complet (Word, Canva, CapCut)</option>
                <option value="Formation Word">Microsoft Word</option>
                <option value="Formation Canva">Canva</option>
                <option value="Formation CapCut">CapCut</option>
            </select>
            <select id="durationSelect">
                <option value="14 jours" data-price="15000">14 jours — 15 000 FCFA</option>
                <option value="28 jours" data-price="30000" data-discount="10">28 jours — 30 000 FCFA (-10%)</option>
            </select>
            <button id="whatsappBtn">Valider mon inscription</button>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
