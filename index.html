<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Digitale 237 - Devis en Ligne</title>
    <!-- On lie notre fichier de style CSS externe -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Connexion Digitale 237</h1>
        <p>Estimez le tarif de votre projet numérique en 2 clics !</p>
    </header>

    <main class="app-container">
        
        <div class="form-group">
            <label for="client-name">Votre Nom ou Entreprise :</label>
            <input type="text" id="client-name" placeholder="Ex: Boutique de Douala, Jean Dupont...">
        </div>

        <h2 class="section-title">Sélectionnez vos services :</h2>

        <div class="services-grid">
            <!-- Service 1 -->
            <div class="service-card">
                <input type="checkbox" value="logo" id="service-logo">
                <h3>Identité Visuelle & Logo</h3>
                <p class="price">25 000 FCFA</p>
            </div>

            <!-- Service 2 -->
            <div class="service-card">
                <input type="checkbox" value="communication" id="service-com">
                <h3>Community Management</h3>
                <p class="price">40 000 FCFA</p>
            </div>

            <!-- Service 3 -->
            <div class="service-card">
                <input type="checkbox" value="website" id="service-web">
                <h3>Création de Site Web</h3>
                <p class="price">150 000 FCFA</p>
            </div>
        </div>

        <div class="result-box">
            <p class="total-label">Montant Total Estimé</p>
            <p class="total-price" id="total-price">0 FCFA</p>
        </div>

        <!-- Bouton d'action WhatsApp -->
        <a href="#" id="whatsapp-btn" class="cta-button" target="_blank" style="display: none;">
            Commander via WhatsApp 💬
        </a>

    </main>

    <!-- On lie notre logique Javascript à la fin -->
    <script src="app.js"></script>
</body>
</html>
