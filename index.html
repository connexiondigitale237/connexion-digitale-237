<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Digitale 237</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo-box">
            <img src="logo.png" alt="Logo" class="nav-logo">
            <span>Connexion Digitale 237</span>
        </div>
        <nav>
            <a href="#services">Services</a>
            <a href="#formations">Formations</a>
        </nav>
    </header>

    <main class="container">
        <section id="services">
            <h1>Nos Services</h1>
            <div class="grid">
                <div class="card"><h3>Pack Starter</h3><p>15 000 FCFA</p></div>
                <div class="card"><h3>Pack Business</h3><p>55 000 FCFA</p></div>
            </div>
        </section>

        <section id="formations">
            <h2>Nos Formations</h2>
            <div class="grid">
                <div class="card"><h3>Microsoft Word</h3><p>Traitement de texte pro.</p></div>
                <div class="card"><h3>Canva</h3><p>Design graphique facile.</p></div>
                <div class="card"><h3>CapCut</h3><p>Montage vidéo mobile.</p></div>
                <div class="card"><h3>Excel A à Z</h3><p>Analyse de données.</p></div>
            </div>
            <div class="form-container">
                <select id="trainingSelect">
                    <option value="Word">Microsoft Word</option>
                    <option value="Canva">Canva</option>
                    <option value="CapCut">CapCut</option>
                    <option value="Excel">Excel A à Z</option>
                </select>
                <button id="whatsappBtn">Valider mon inscription</button>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
